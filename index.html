<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PPG Pulso</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --r: #ff4d6d;
    --g: #39d98a;
    --b: #4d9fff;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #7c5cfc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 2rem;
  }

  /* Grid pattern background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 1.25rem; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-top: 0.5rem; }
  .logo { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); letter-spacing: 0.1em; }
  .logo span { color: var(--accent); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.recording { background: var(--r); box-shadow: 0 0 8px var(--r); animation: pulse-dot 1s infinite; }
  .status-dot.done { background: var(--g); box-shadow: 0 0 8px var(--g); }

  @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* Camera preview */
  .cam-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 16px;
    overflow: hidden;
    background: var(--surface);
    border: 0.5px solid var(--border);
    margin-bottom: 1rem;
  }

  video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  /* ROI overlay */
  .roi-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .roi-box {
    width: 100px; height: 100px;
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 12px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
    position: relative;
  }
  .roi-box::before {
    content: 'Pon el dedo aquí';
    position: absolute;
    bottom: -28px;
    left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.7);
    white-space: nowrap; font-family: 'DM Sans', sans-serif;
  }

  /* Progress bar */
  .progress-wrap { margin-bottom: 1rem; }
  .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .progress-label { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .progress-count { font-size: 12px; color: var(--accent); font-family: 'Space Mono', monospace; }
  .progress-bar-bg {
    height: 4px; background: var(--surface2);
    border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--b));
    border-radius: 2px;
    transition: width 0.1s linear;
  }

  /* Live signal preview */
  .live-signal {
    height: 56px;
    background: var(--surface);
    border-radius: 10px;
    border: 0.5px solid var(--border);
    overflow: hidden;
    margin-bottom: 1rem;
    position: relative;
  }
  .live-signal canvas { display: block; }
  .live-label {
    position: absolute; top: 6px; left: 10px;
    font-size: 10px; color: var(--muted);
    font-family: 'Space Mono', monospace; letter-spacing: 0.05em;
  }

  /* Big button */
  .btn-start {
    width: 100%; padding: 1rem;
    border-radius: 12px;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 13px; letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1rem;
  }
  .btn-start.idle {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 24px rgba(124,92,252,0.3);
  }
  .btn-start.idle:active { transform: scale(0.98); box-shadow: none; }
  .btn-start.recording {
    background: var(--surface2);
    color: var(--muted);
    border: 0.5px solid var(--border);
    cursor: not-allowed;
  }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-label { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; display: block; margin-bottom: 4px; }
  .stat-val { font-size: 18px; font-weight: 500; font-family: 'Space Mono', monospace; }
  .stat-val.r { color: var(--r); }
  .stat-val.g { color: var(--g); }
  .stat-val.b { color: var(--b); }

  /* Chart panel */
  .chart-panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1rem;
    margin-bottom: 1rem;
    display: none;
  }
  .chart-panel.visible { display: block; }
  .chart-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 0.75rem;
  }
  .chart-title span { color: var(--text); }

  /* BPM result */
  .bpm-card {
    background: var(--surface2);
    border: 0.5px solid rgba(124,92,252,0.3);
    border-radius: 16px;
    padding: 1.25rem;
    text-align: center;
    display: none;
    margin-bottom: 1rem;
  }
  .bpm-card.visible { display: block; }
  .bpm-label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.1em; margin-bottom: 8px; }
  .bpm-value { font-family: 'Space Mono', monospace; font-size: 48px; font-weight: 700; color: var(--accent); line-height: 1; }
  .bpm-unit { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .bpm-fps { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 6px; }

  /* Info chip */
  .info-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 99px;
    padding: 6px 12px;
    font-size: 11px; color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 0.75rem;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; }

  canvas.live-canvas { width: 100%; height: 56px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo"><span>PPG</span>_pulso v1.0</div>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <div class="info-chip">
    <span class="dot" style="background:var(--accent)"></span>
    Linterna activa durante medición
  </div>

  <!-- Cámara -->
  <div class="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="roi-overlay">
      <div class="roi-box" id="roiBox"></div>
    </div>
  </div>

  <!-- Progreso -->
  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-header">
      <span class="progress-label">CAPTURANDO FRAMES</span>
      <span class="progress-count" id="progressCount">0 / 150</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Señal en vivo R G B -->
  <div class="live-signal" id="liveSignalWrap" style="display:none; height:auto; padding: 8px 0 4px;">
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 10px 4px;">
      <span class="live-label" style="position:static">SEÑAL EN VIVO</span>
      <div style="display:flex;gap:10px;">
        <span style="font-size:10px;color:#ff4d6d;font-family:'Space Mono',monospace;">● R</span>
        <span style="font-size:10px;color:#39d98a;font-family:'Space Mono',monospace;">● G</span>
        <span style="font-size:10px;color:#4d9fff;font-family:'Space Mono',monospace;">● B</span>
      </div>
    </div>
    <canvas id="liveCanvas" class="live-canvas" width="480" height="80"></canvas>
  </div>

  <!-- Botón -->
  <button class="btn-start idle" id="btnStart" onclick="startMeasurement()">
    ▶ INICIAR MEDICIÓN (5 s)
  </button>

  <!-- Stats en vivo -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><span class="stat-label">R mean</span><span class="stat-val r" id="statR">—</span></div>
    <div class="stat-card"><span class="stat-label">G mean</span><span class="stat-val g" id="statG">—</span></div>
    <div class="stat-card"><span class="stat-label">B mean</span><span class="stat-val b" id="statB">—</span></div>
  </div>

  <!-- BPM -->
  <div class="bpm-card" id="bpmCard">
    <div class="bpm-label">FRECUENCIA CARDÍACA ESTIMADA</div>
    <div class="bpm-value" id="bpmVal">—</div>
    <div class="bpm-unit">latidos / minuto</div>
    <div class="bpm-fps" id="bpmFps"></div>
  </div>

  <!-- Gráfica señales filtradas -->
  <div class="chart-panel" id="chartPanel">
    <div class="chart-title">SEÑALES PPG FILTRADAS — <span>Comparación R · G · B</span></div>
    <canvas id="ppgChart" height="200"></canvas>
  </div>

  <!-- Gráfica espectro -->
  <div class="chart-panel" id="specPanel">
    <div class="chart-title">ESPECTRO DE FRECUENCIA — <span>canal R</span></div>
    <canvas id="specChart" height="140"></canvas>
  </div>

</div>

<!-- Canvas oculto para procesamiento -->
<canvas id="offscreen" style="display:none" width="160" height="120"></canvas>

<script>
// ─── Estado global ───────────────────────────────────────────────
let videoEl = document.getElementById('video');
let offCanvas = document.getElementById('offscreen');
let ctx2d = offCanvas.getContext('2d', { willReadFrequently: true });
let stream = null;
let track = null;
let collecting = false;
let frameBuffer = [];        // [{r,g,b}]
const TOTAL_FRAMES = 150;
const FL = 0.4;              // Hz, igual que MATLAB
const FH = 5.0;              // Hz, igual que MATLAB
const DROP_FRAMES = 30;      // primeros 30 frames descartados (igual que MATLAB color(1:30,:)=[])
let ppgChartInst = null;
let specChartInst = null;
let liveCtx = document.getElementById('liveCanvas').getContext('2d');
let liveBufferR = [], liveBufferG = [], liveBufferB = [];
let startTime = 0;

// ─── Iniciar cámara al cargar ────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await initCamera();
});

async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 },
        frameRate: { ideal: 30 }
      },
      audio: false
    });
    videoEl.srcObject = stream;
    track = stream.getVideoTracks()[0];
    // Intentar activar linterna
    try { await track.applyConstraints({ advanced: [{ torch: false }] }); } catch(e) {}
  } catch(e) {
    alert('No se pudo acceder a la cámara: ' + e.message);
  }
}

// ─── Extraer promedio RGB de frame (región central) ──────────────
function extractRGB() {
  // Dibuja frame en canvas pequeño (más rápido)
  ctx2d.drawImage(videoEl, 0, 0, offCanvas.width, offCanvas.height);
  const cx = offCanvas.width / 2;
  const cy = offCanvas.height / 2;
  const roiW = 60, roiH = 60;
  const imgData = ctx2d.getImageData(cx - roiW/2, cy - roiH/2, roiW, roiH);
  const d = imgData.data;
  let r = 0, g = 0, b = 0;
  const n = d.length / 4;
  for (let i = 0; i < d.length; i += 4) {
    r += d[i]; g += d[i+1]; b += d[i+2];
  }
  return { r: r/n, g: g/n, b: b/n };
}

// ─── Dibujar señal en vivo R G B ─────────────────────────────────
function drawLive() {
  const c = document.getElementById('liveCanvas');
  const W = c.width, H = c.height;
  liveCtx.clearRect(0, 0, W, H);

  const channels = [
    { buf: liveBufferR, color: 'rgba(255,77,109,0.9)' },
    { buf: liveBufferG, color: 'rgba(57,217,138,0.9)' },
    { buf: liveBufferB, color: 'rgba(77,159,255,0.9)' },
  ];

  // Escala global usando los 3 canales juntos para que sean comparables
  const allVals = [...liveBufferR, ...liveBufferG, ...liveBufferB];
  const globalMin = Math.min(...allVals);
  const globalMax = Math.max(...allVals);
  const range = globalMax - globalMin || 1;

  channels.forEach(({ buf, color }) => {
    if (buf.length < 2) return;
    const vals = buf.slice(-200);
    liveCtx.beginPath();
    liveCtx.strokeStyle = color;
    liveCtx.lineWidth = 1.5;
    vals.forEach((v, i) => {
      const x = (i / (vals.length - 1)) * W;
      const y = H - ((v - globalMin) / range) * (H - 8) - 4;
      i === 0 ? liveCtx.moveTo(x, y) : liveCtx.lineTo(x, y);
    });
    liveCtx.stroke();
  });
}

// ─── Iniciar medición ────────────────────────────────────────────
async function startMeasurement() {
  if (collecting) return;
  collecting = true;
  frameBuffer = [];
  liveBufferR = []; liveBufferG = []; liveBufferB = [];

  // Activar linterna
  try { await track.applyConstraints({ advanced: [{ torch: true }] }); } catch(e) {}

  // UI
  document.getElementById('btnStart').className = 'btn-start recording';
  document.getElementById('btnStart').textContent = '⏺ GRABANDO...';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('liveSignalWrap').style.display = 'block';
  document.getElementById('bpmCard').classList.remove('visible');
  document.getElementById('chartPanel').classList.remove('visible');
  document.getElementById('specPanel').classList.remove('visible');
  document.getElementById('statusDot').className = 'status-dot recording';

  if (ppgChartInst) { ppgChartInst.destroy(); ppgChartInst = null; }
  if (specChartInst) { specChartInst.destroy(); specChartInst = null; }

  startTime = performance.now();
  captureLoop();
}

function captureLoop() {
  if (frameBuffer.length >= TOTAL_FRAMES) {
    finalize();
    return;
  }
  requestAnimationFrame(() => {
    const rgb = extractRGB();
    frameBuffer.push(rgb);
    liveBufferR.push(rgb.r);
    liveBufferG.push(rgb.g);
    liveBufferB.push(rgb.b);
    drawLive();

    // Actualizar UI
    const n = frameBuffer.length;
    document.getElementById('progressCount').textContent = `${n} / ${TOTAL_FRAMES}`;
    document.getElementById('progressFill').style.width = `${(n/TOTAL_FRAMES)*100}%`;
    document.getElementById('statR').textContent = rgb.r.toFixed(1);
    document.getElementById('statG').textContent = rgb.g.toFixed(1);
    document.getElementById('statB').textContent = rgb.b.toFixed(1);

    captureLoop();
  });
}

// ─── Finalizar: procesar señal (igual que MATLAB) ────────────────
async function finalize() {
  const duracion = (performance.now() - startTime) / 1000;
  const fps = TOTAL_FRAMES / duracion;

  // Apagar linterna
  try { await track.applyConstraints({ advanced: [{ torch: false }] }); } catch(e) {}

  // Extraer canales
  let r = frameBuffer.map(f => f.r);
  let g = frameBuffer.map(f => f.g);
  let b = frameBuffer.map(f => f.b);

  // Eliminar primeros 30 frames (igual que MATLAB: color(1:30,:) = [])
  r = r.slice(DROP_FRAMES);
  g = g.slice(DROP_FRAMES);
  b = b.slice(DROP_FRAMES);

  // Filtrar: highpass luego lowpass
  const rF = lowpass(highpass(r, FL, fps), FH, fps);
  const gF = lowpass(highpass(g, FL, fps), FH, fps);
  const bF = lowpass(highpass(b, FL, fps), FH, fps);

  // Eje de tiempo
  const muestras = rF.length;
  const totalDur = duracion * (muestras / TOTAL_FRAMES);
  const t = Array.from({length: muestras}, (_, i) => parseFloat((1 + i*(totalDur-1)/(muestras-1)).toFixed(3)));

  // Calcular BPM desde FFT del canal R
  const bpm = estimateBPM(rF, fps);

  // Actualizar UI
  document.getElementById('bpmVal').textContent = Math.round(bpm);
  document.getElementById('bpmFps').textContent = `fps real: ${fps.toFixed(1)} · frames procesados: ${muestras}`;
  document.getElementById('bpmCard').classList.add('visible');
  document.getElementById('btnStart').className = 'btn-start idle';
  document.getElementById('btnStart').textContent = '▶ MEDIR DE NUEVO';
  document.getElementById('statusDot').className = 'status-dot done';
  collecting = false;

  // Graficar señales filtradas
  renderPPGChart(t, rF, gF, bF);
  // Graficar espectro
  renderSpecChart(rF, fps);
}

// ─── Filtros digitales (Butterworth 2do orden approx) ────────────
// Equivalente funcional a highpass() y lowpass() de MATLAB Signal Toolbox
function highpass(sig, fc, fs) {
  const RC = 1 / (2 * Math.PI * fc);
  const dt = 1 / fs;
  const alpha = RC / (RC + dt);
  const out = new Array(sig.length);
  out[0] = sig[0];
  for (let i = 1; i < sig.length; i++) {
    out[i] = alpha * (out[i-1] + sig[i] - sig[i-1]);
  }
  return out;
}

function lowpass(sig, fc, fs) {
  const RC = 1 / (2 * Math.PI * fc);
  const dt = 1 / fs;
  const alpha = dt / (RC + dt);
  const out = new Array(sig.length);
  out[0] = sig[0];
  for (let i = 1; i < sig.length; i++) {
    out[i] = out[i-1] + alpha * (sig[i] - out[i-1]);
  }
  return out;
}

// ─── FFT (Cooley-Tukey) para estimar BPM ─────────────────────────
function fft(re, im) {
  const n = re.length;
  if (n <= 1) return;
  const re_even = [], re_odd = [], im_even = [], im_odd = [];
  for (let i = 0; i < n; i += 2) { re_even.push(re[i]); im_even.push(im[i]); }
  for (let i = 1; i < n; i += 2) { re_odd.push(re[i]);  im_odd.push(im[i]);  }
  fft(re_even, im_even);
  fft(re_odd, im_odd);
  for (let k = 0; k < n/2; k++) {
    const angle = -2 * Math.PI * k / n;
    const wr = Math.cos(angle), wi = Math.sin(angle);
    const tr = wr*re_odd[k] - wi*im_odd[k];
    const ti = wr*im_odd[k] + wi*re_odd[k];
    re[k]       = re_even[k] + tr;
    im[k]       = im_even[k] + ti;
    re[k + n/2] = re_even[k] - tr;
    im[k + n/2] = im_even[k] - ti;
  }
}

function nextPow2(n) { let p = 1; while(p < n) p <<= 1; return p; }

function estimateBPM(sig, fps) {
  const N = nextPow2(sig.length);
  const re = new Array(N).fill(0);
  const im = new Array(N).fill(0);
  for (let i = 0; i < sig.length; i++) re[i] = sig[i];
  fft(re, im);

  const mag = re.map((r,i) => Math.sqrt(r*r + im[i]*im[i]));
  // Buscar pico en rango 42–180 BPM (0.7–3 Hz)
  let bestK = 0, bestMag = 0;
  for (let k = 1; k <= N/2; k++) {
    const freq = k * fps / N;
    const bpm = freq * 60;
    if (bpm >= 42 && bpm <= 180 && mag[k] > bestMag) {
      bestMag = mag[k];
      bestK = k;
    }
  }
  return bestK * fps / N * 60;
}

// ─── Render gráfica PPG (replica tu MATLAB superplot) ────────────
function renderPPGChart(t, r, g, b) {
  document.getElementById('chartPanel').classList.add('visible');
  const ctx = document.getElementById('ppgChart').getContext('2d');
  ppgChartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels: t.map(v => v.toFixed(1)),
      datasets: [
        { label: 'Componente R', data: r, borderColor: '#ff4d6d', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
        { label: 'Componente G', data: g, borderColor: '#39d98a', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
        { label: 'Componente B', data: b, borderColor: '#4d9fff', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
      ]
    },
    options: {
      responsive: true,
      animation: { duration: 400 },
      scales: {
        x: {
          title: { display: true, text: 't / s', color: '#6b6b80', font: { family: 'Space Mono', size: 10 } },
          ticks: { color: '#6b6b80', font: { size: 9 }, maxTicksLimit: 8, autoSkip: true },
          grid: { color: 'rgba(255,255,255,0.04)' }
        },
        y: {
          title: { display: true, text: 'y(t)', color: '#6b6b80', font: { family: 'Space Mono', size: 10 } },
          ticks: { color: '#6b6b80', font: { size: 9 } },
          grid: { color: 'rgba(255,255,255,0.04)' },
          min: -3, max: 3
        }
      },
      plugins: {
        legend: { labels: { color: '#e8e8f0', font: { family: 'Space Mono', size: 10 }, boxWidth: 12 } },
        tooltip: { mode: 'index', intersect: false }
      }
    }
  });
}

// ─── Render espectro de frecuencia ────────────────────────────────
function renderSpecChart(sig, fps) {
  document.getElementById('specPanel').classList.add('visible');
  const N = nextPow2(sig.length);
  const re = new Array(N).fill(0);
  const im = new Array(N).fill(0);
  for (let i = 0; i < sig.length; i++) re[i] = sig[i];
  fft(re, im);

  const freqs = [], mags = [];
  for (let k = 1; k <= N/2; k++) {
    const freq = k * fps / N;
    if (freq > 0.3 && freq < 5.5) {
      freqs.push(freq.toFixed(2));
      mags.push(Math.sqrt(re[k]*re[k] + im[k]*im[k]));
    }
  }

  const ctx = document.getElementById('specChart').getContext('2d');
  specChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: freqs,
      datasets: [{
        label: 'Magnitud FFT (R)',
        data: mags,
        backgroundColor: freqs.map(f => {
          const bpm = parseFloat(f) * 60;
          return (bpm >= 42 && bpm <= 180) ? 'rgba(124,92,252,0.7)' : 'rgba(255,255,255,0.1)';
        }),
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 300 },
      scales: {
        x: {
          title: { display: true, text: 'Frecuencia (Hz)', color: '#6b6b80', font: { family: 'Space Mono', size: 10 } },
          ticks: { color: '#6b6b80', font: { size: 8 }, maxTicksLimit: 10 },
          grid: { color: 'rgba(255,255,255,0.04)' }
        },
        y: {
          ticks: { color: '#6b6b80', font: { size: 9 } },
          grid: { color: 'rgba(255,255,255,0.04)' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const bpm = (parseFloat(ctx.label) * 60).toFixed(0);
              return `Mag: ${ctx.raw.toFixed(1)} | ${bpm} BPM`;
            }
          }
        }
      }
    }
  });
}
</script>
</body>
</html>
